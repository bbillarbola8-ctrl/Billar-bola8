  async function clearTable(table) {
    await fetch(`${SUPA_URL}/rest/v1/${table}?id=neq.00000000-0000-0000-0000-000000000000`, { method: 'DELETE', headers: h() });
  }

  async function seedTable(table, items) {
    await clearTable(table);
    for (const item of items) {
      const res = await fetch(`${SUPA_URL}/rest/v1/${table}`, { method: 'POST', headers: h(), body: JSON.stringify(item) });
      if (res.ok) print(`✓ ${item.nombre || item.texto}`, 'ok');
      else print(`✗ Error: ${item.nombre || item.texto}`, 'err');
    }
  }

  async function run() {
    try {
      print('Cargando ofertas...');
      await seedTable('ofertas', OFERTAS);
      print('Cargando bebidas...');
      await seedTable('bebidas', BEBIDAS);
      print('Cargando comida...');
      await seedTable('comida', COMIDA);
      print('Cargando galería...');
      await seedTable('galeria', GALERIA);
      print('✅ ¡Listo! Todos los datos fueron cargados. Puedes cerrar esta página.', 'done');
    } catch(e) {
      print('❌ Error: ' + e.message, 'err');
    }
  }

  run();
