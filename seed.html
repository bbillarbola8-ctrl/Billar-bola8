  async function clearCollection(name) {
    const snap = await getDocs(collection(db, name));
    await Promise.all(snap.docs.map(d => deleteDoc(doc(db, name, d.id))));
  }

  async function seedCollection(name, items) {
    await clearCollection(name);
    for (const item of items) {
      await addDoc(collection(db, name), item);
      print(`✓ ${item.nombre}`, 'ok');
    }
  }

  async function run() {
    try {
      print('Cargando ofertas...');
      await seedCollection('ofertas', OFERTAS);

      print('Cargando bebidas...');
      await seedCollection('bebidas', BEBIDAS);

      print('Cargando comida...');
      await seedCollection('comida', COMIDA);

      print('Cargando galería...');
      await seedCollection('galeria', GALERIA);

      print('✅ ¡Listo! Todos los datos fueron cargados correctamente. Puedes cerrar esta página.', 'done');
    } catch (e) {
      print('❌ Error: ' + e.message, 'err');
    }
  }

  run();
